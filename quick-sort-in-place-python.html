<!doctype html>
<html>
    <head>
        <title>Rearrange the algorithms</title>
        <link href="./parsons.css" rel="stylesheet" />
        <link href="./lib/prettify.css" rel="stylesheet" />
        <script src="./lib/prettify.js"></script>
    </head>
    <body>
        <h2>Quick sort (in place) in Python</h2>
        <p>Drag and drop the lines into the box on the right. Put the partition function first and the quicksort one underneath.</p>
          
        <div id="sortableTrash" class="sortable-code"></div>
        <div id="sortable" class="sortable-code">
        </div>
        <div style="clear:both;"></div>
        <p>
            <button class='restart' href="#" id="newInstanceLink">Start again</button>
            <button class='submit' href="#" id="feedbackLink">Check my answer</button>
        </p>
        <script src="./lib/jquery.min.js"></script>
        <script src="./lib/jquery-ui.min.js"></script>
        <script src="./lib/jquery.ui.touch-punch.min.js"></script>
        <script src="./lib/underscore-min.js"></script>
        <script src="./lib/lis.js"></script>
        <script src="./parsons.js"></script>
        <script>
        var initial = 'def partition(array, start, end):\n'+
'  """Partitions array: smaller items, then the pivot, then bigger items. Returns index of pivot."""\n'+
'  pivot = array[end] #Firstly, pick the last element as the pivot each time..\n'+
'  end_of_smaller_section = start - 1 #..then set up the imaginary borderline.\n'+
'  for i in range(start, end):#go through the section of the array..\n'+
'     #find a small element..\n'+
'     if array[i] <= pivot:\n'+
'       #make room for the small one by moving the borderline right..\n'+
'       end_of_smaller_section += 1\n'+
'       #put the small element in the small section (swap it with the first big element)..\n'+
'       array[end_of_smaller_section], array[i] = array[i], array[end_of_smaller_section]\n'+
'  #put the pivot in the right place (after the smaller section) and return its index:\n'+
'  final_pivot_position = end_of_smaller_section + 1\n'+
'  array[final_pivot_position], array[end] = array[end], array[final_pivot_position]\n'+
'  return final_pivot_position\n'+
'def quicksort(array, start, end):\n'+
'  """Sorts the array in place. Divide and conquer: partitions the array, \n'+
'  then sorts the smaller and bigger sections recursively."""\n'+
'  # only bother to sort if the section has 2 or more items..\n'+
'  if start < end:\n'+
'      #put the pivot in the right place and get its index..\n'+
'      pivot_index = partition(array, start, end)\n'+
'      #quicksort the left (smaller) and right (bigger) subsections..\n'+
'      quicksort(array, start, pivot_index-1)\n'+
'      quicksort(array, pivot_index+1, end)\n';

        function displayErrors(fb) {
            if(fb.errors.length > 0) {
                alert(fb.errors[0]);
            }
        } 

        $(document).ready(function(){
            var parson = new ParsonsWidget({
                'sortableId': 'sortable',
                'trashId': 'sortableTrash',
                'max_wrong_lines': 2,
                'feedback_cb' : displayErrors
            });
            parson.init(initial);
            parson.shuffleLines();
            $("#newInstanceLink").click(function(event){
                event.preventDefault();
                parson.shuffleLines();
            });
            $("#feedbackLink").click(function(event){
                event.preventDefault();
                parson.getFeedback();
            });
        });
        </script>
        <footer><a href="index.html" >Take me back to the algorithms...</a>&nbsp;&nbsp;|&nbsp;&nbsp;<a href="https://ludlowcode.github.io/revision-materials/" target="_blank">Dave's Revision World</a></footer>
    </body>
</html>
